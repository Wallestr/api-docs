<h1>Подключение API</h1>

<h2>Endpoint</h2>

<pre>
POST https://api.site.com/generate
</pre>

<h2>Headers</h2>

<pre>
Authorization: Bearer YOUR_API_KEY
</pre>

<h2>Python пример</h2>

<pre>
import requests

r = requests.post(
    "https://api.site.com/generate",
    headers={
        "Authorization": "Bearer TOKEN"
    }
)

print(r.json())
</pre>
